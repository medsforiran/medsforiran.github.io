<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meds For Iran</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* ... YOUR EXISTING CSS REMAINS EXACTLY THE SAME ... */
    :root {
      --bg:        #f6f6f6;
      --surface:   #f6f6f6;
      --surface2:  #f6f6f6;
      --border:    #000000;
      --accent:    #000;
      --accent2:   #fff;
      --danger:    #DA0000;
      --text:      #232323;
      --muted:     #424242;
      --radius:    10px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 6rem;
    }

    header {
      background: linear-gradient(135deg, #0d1117 0%, #12202e 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .logo { font-family: 'Poppins', serif; font-size: 1.6rem; color: var(--accent2); letter-spacing: -.5px; }
    .logo span { color: var(--accent2); }
    .badge { background: #239F40; color: #ffffff; font-size: .65rem; font-weight: 600; padding: .15rem .5rem; border-radius: 50px; letter-spacing: .5px; text-transform: uppercase; }
    .badge-admin { background: #DA0000; color: #ffffff; font-size: .65rem; font-weight: 600; padding: .15rem .5rem; border-radius: 50px; letter-spacing: .5px; text-transform: uppercase; display: none; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }

    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-family: 'Poppins', serif; font-size: 1.15rem; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }

    .admin-only { display: none !important; }
    body.admin-unlocked .admin-only { display: block !important; }
    body.admin-unlocked .badge-admin { display: inline !important; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .75rem; }
    label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: .3rem; letter-spacing: .4px; text-transform: uppercase; }
    input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: .6rem .85rem; font-family: inherit; font-size: .9rem; transition: border-color .2s; outline: none; }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border-radius: 6px; font-family: inherit; font-size: .85rem; font-weight: 600; cursor: pointer; border: none; transition: opacity .2s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-ghost    { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-warning  { background: #239F40; color: #fff; }
    .btn-sm       { padding: .35rem .75rem; font-size: .78rem; }
    .btn:hover    { opacity: .85; }

    .search-bar { display: flex; gap: .75rem; align-items: stretch; }
    .search-bar input { flex: 1; }

    .stats { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem 1.25rem; flex: 1; min-width: 130px; }
    .stat-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: .25rem; }
    .stat-value { font-family: 'Poppins', serif; font-size: 1.8rem; color: var(--accent); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead th { padding: .75rem 1rem; text-align: left; font-size: .7rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:hover { background: var(--surface2); }
    td { padding: .75rem 1rem; vertical-align: middle; }
    .pill { display: inline-block; background: rgba(63,184,154,.15); color: var(--accent); border: 1px solid rgba(63,184,154,.3); border-radius: 50px; padding: .15rem .65rem; font-size: .72rem; font-weight: 600; white-space: nowrap; }
    .actions { display: flex; gap: .4rem; flex-wrap: wrap; }

    .empty { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: .75rem; }
    .empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--text); margin-bottom: .4rem; }

    .toast { position: fixed; bottom: 5.5rem; right: 1.5rem; background: var(--accent2); color: #DA0000; font-weight: 600; padding: .85rem 1.4rem; border-radius: var(--radius); box-shadow: var(--shadow); font-size: .875rem; z-index: 999; animation: slideUp .3s ease; border: 1px solid #DA0000; }
    .toast.error { background: var(--danger); color: #fff; border: none; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; position: relative; }
    .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); background: rgba(63,184,154,.05); }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    .upload-area p { color: var(--muted); font-size: .85rem; }
    .upload-area strong { color: var(--accent); }

    .edit-row td { padding: .5rem; }
    .edit-row input { padding: .4rem .6rem; }

    .admin-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .85rem 1.5rem;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
    }
    .admin-panel .lock-label {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--muted); white-space: nowrap;
    }
    .admin-panel input[type="password"] { max-width: 220px; padding: .5rem .85rem; font-size: .875rem; }
    .admin-status { font-size: .8rem; font-weight: 600; white-space: nowrap; }
    .admin-status.locked   { color: var(--muted); }
    .admin-status.unlocked { color: var(--accent); }
    .admin-status.failed   { color: var(--danger); }
    .lock-icon { font-size: 1.1rem; }

    #pdf-progress { display: none; align-items: center; gap: .75rem; margin-top: .75rem; }
    #pdf-progress progress { flex: 1; height: 5px; border-radius: 3px; appearance: none; }
    #pdf-progress progress::-webkit-progress-bar { background: #ddd; border-radius: 3px; }
    #pdf-progress progress::-webkit-progress-value { background: var(--accent); border-radius: 3px; }
    #pdf-progress span { font-size: .75rem; color: var(--muted); white-space: nowrap; }

    @media (max-width: 640px) {
      header { flex-wrap: wrap; }
      .logo { font-size: 1.35rem; }
      table thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tbody tr { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .75rem; background: var(--surface); padding: .75rem; }
      td { padding: .3rem .5rem; }
      td::before { content: attr(data-label); display: block; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: .15rem; }
      td:last-child { margin-top: .5rem; }
      .form-grid { grid-template-columns: 1fr; }
      .stats { gap: .5rem; }
      .stat { min-width: 100px; }
      .edit-row, .edit-row td { display: block; }
      .admin-panel { flex-direction: row; align-items: center; gap: .5rem; padding: .75rem 1rem; }
      .admin-panel input[type="password"] { max-width: 40%; width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Meds For Iran</div>
    <span class="badge">Inventory</span>
    <span class="badge-admin">Admin Mode</span>
    <div class="header-right">
      <span style="font-size:.8rem; color:var(--accent2);" id="record-count">— records</span>
    </div>
  </header>

  <div class="container">

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total Medicines</div>
        <div class="stat-value" id="stat-count">—</div>
      </div>
    </div>

    <div class="card admin-only" id="import-card">
      <div class="card-title">Import from PDF</div>
      <div class="upload-area" id="drop-zone">
        <input type="file" id="pdf-input" accept=".pdf"/>
        <span class="upload-icon">📋</span>
        <p><strong>Click or drag a PDF here</strong></p>
        <p>Columns expected: Serial · Generic Code · Name · Manufacturers · Qty</p>
      </div>
      <div id="pdf-progress">
        <progress id="pdf-progress-bar" value="0" max="100"></progress>
        <span id="pdf-progress-label">Parsing…</span>
      </div>
      <div style="display:flex; align-items:center; gap:.75rem; margin-top:.75rem;">
        <span style="font-size:.8rem; color:var(--muted);" id="upload-status"></span>
        <button class="btn btn-primary" style="margin-right:auto;" onclick="triggerPdfImport()" id="btn-import">Import PDF</button>
      </div>
    </div>

    <div class="card admin-only" id="add-card">
      <div class="card-title">Add Medicine</div>
      <div class="form-grid">
        <div><label>Serial / Row #</label><input id="f-serial" placeholder="Auto"/></div>
        <div><label>Generic Code *</label><input id="f-code" placeholder="e.g. AMX500"/></div>
        <div><label>Medicine Name *</label><input id="f-name" placeholder="e.g. Amoxicillin"/></div>
        <div><label>Manufacturers *</label><input id="f-mfr" placeholder="e.g. Pfizer, GSK"/></div>
        <div><label>Required Quantity *</label><input id="f-qty" placeholder="e.g. 500 units"/></div>
      </div>
      <div style="margin-top:1rem;">
        <button class="btn btn-primary" onclick="addMedicine()" id="btn-add">Add Medicine</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Medicine List</div>
      <div class="search-bar" style="margin-bottom:1rem;">
        <input type="search" id="search-input" placeholder="Search by name, code, or manufacturer" oninput="renderTable()"/>
      </div>
      <div id="medicine-list">
        <div class="empty"><h3>Loading data...</h3></div>
      </div>
    </div>

  </div><div class="admin-panel">
    <span class="lock-icon" id="lock-icon"></span>
    <span class="lock-label">Admin Password</span>
    <input type="password" id="admin-pw-input" placeholder="Enter password" autocomplete="current-password"/>
    <button class="btn btn-ghost btn-sm" onclick="attemptUnlock()">Unlock</button>
    <button class="btn btn-ghost btn-sm" id="lock-btn" onclick="lockAdmin()" style="display:none;">🔒 Lock</button>
    <span class="admin-status locked" id="admin-status">Enter password to edit</span>
  </div>

  <div id="toast-container"></div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    // 🚨 REPLACE THESE WITH YOUR SUPABASE CREDENTIALS 🚨
    const SUPABASE_URL = 'https://wmrxiuyvjsbzxbgxplyj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtcnhpdXl2anNienhiZ3hwbHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjE1NTgsImV4cCI6MjA5MDczNzU1OH0.6e5JUIiMV-HCEuipVAo-530908U3TJptrxte_OmJeGs';
    const ADMIN_EMAIL = 'admin@medsforiran.com'; // 👈 The email you created in Step 2
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ── State ────────────────────────────────────────────────
    let db            = [];
    let adminUnlocked = false;
    let editingId     = null;
    
    // ── DB helpers ───────────────────────────────────────────
    async function loadDB() {
      try {
        const { data, error } = await supabaseClient
          .from('medicines')
          .select('*')
          .order('id', { ascending: true });
    
        if (error) {
          console.error("Supabase Error:", error);
          showToast('Failed to load database.', 'error');
          return;
        }
        db = data || [];
        renderTable();
      } catch (err) {
        console.error(err);
        showToast('Failed to connect to Supabase.', 'error');
      }
    }
    
    // ── Escape HTML ──────────────────────────────────────────
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    // ── Render table ─────────────────────────────────────────
    function renderTable() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      let data = db;
      if (q) {
        data = db.filter(m =>
          (m.name||'').toLowerCase().includes(q) ||
          (m.generic_code||'').toLowerCase().includes(q) ||
          (m.manufacturers||'').toLowerCase().includes(q)
        );
      }
    
      document.getElementById('stat-count').textContent = db.length;
      const n = db.length;
      document.getElementById('record-count').textContent = n + ' record' + (n !== 1 ? 's' : '');
    
      const list = document.getElementById('medicine-list');
    
      if (!data.length) {
        list.innerHTML = `<div class="empty">
          <div class="empty-icon"></div>
          <h3>${q ? 'No results found' : 'No medicines yet'}</h3>
          <p>${q ? 'Try a different search term.' : 'Add one manually or import a PDF above'}</p>
        </div>`;
        return;
      }
    
      const actionsTh = adminUnlocked ? '<th>Actions</th>' : '';
    
      let rows = '';
      for (const m of data) {
        if (editingId === m.id) {
          rows += `<tr class="edit-row" id="med-row-${m.id}">
            <td data-label="Serial"><input id="e-serial" value="${esc(m.serial)}" style="width:60px"/></td>
            <td data-label="Generic Code"><input id="e-code" value="${esc(m.generic_code)}" style="width:90px"/></td>
            <td data-label="Medicine Name"><input id="e-name" value="${esc(m.name)}" style="min-width:180px"/></td>
            <td data-label="Manufacturers"><input id="e-mfr" value="${esc(m.manufacturers)}" style="min-width:180px"/></td>
            <td data-label="Qty Required"><input id="e-qty" value="${esc(m.quantity)}" style="width:90px"/></td>
            <td data-label="Actions"><div class="actions">
              <button class="btn btn-warning btn-sm" onclick="saveEdit(${m.id})">Save</button>
              <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">✕ Cancel</button>
            </div></td>
          </tr>`;
        } else {
          const actionsTd = adminUnlocked ? `<td data-label="Actions" class="action-cell">
            <div class="actions">
              <button class="btn btn-warning btn-sm" onclick="startEdit(${m.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteMedicine(${m.id}, '${esc(m.name).replace(/'/g,"\'")}')">Delete</button>
            </div></td>` : '';
          rows += `<tr id="med-row-${m.id}">
            <td data-label="Serial">${esc(m.serial)}</td>
            <td data-label="Generic Code"><span class="pill">${esc(m.generic_code)}</span></td>
            <td data-label="Medicine Name" style="font-weight:600;">${esc(m.name)}</td>
            <td data-label="Manufacturers" style="color:var(--muted); font-size:.82rem;">${esc(m.manufacturers)}</td>
            <td data-label="Qty Required">${esc(m.quantity)}</td>
            ${actionsTd}
          </tr>`;
        }
      }
    
      list.innerHTML = `<div class="table-wrap"><table>
        <thead><tr>
          <th>#</th><th>Generic Code</th><th>Medicine Name</th>
          <th>Manufacturers</th><th>Qty Required</th>${actionsTh}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    }
    
    // ── CRUD (Requires Auth Now) ─────────────────────────────
    async function addMedicine() {
      if (!adminUnlocked) { showToast('Must be logged in.', 'error'); return; }
    
      const name = document.getElementById('f-name').value.trim();
      const code = document.getElementById('f-code').value.trim();
      const mfr  = document.getElementById('f-mfr').value.trim();
      const qty  = document.getElementById('f-qty').value.trim();
      const ser  = document.getElementById('f-serial').value.trim();
      
      if (!name || !code) { showToast('Name and Generic Code are required.', 'error'); return; }
    
      const btn = document.getElementById('btn-add');
      btn.textContent = "Adding..."; btn.disabled = true;
    
      const { data, error } = await supabaseClient.from('medicines').insert([{ 
        serial: ser, generic_code: code, name: name, manufacturers: mfr, quantity: qty 
      }]).select();
    
      btn.textContent = "Add Medicine"; btn.disabled = false;
    
      if (error) {
        showToast('Permission Denied or Error', 'error');
        console.error(error);
      } else if (data && data.length > 0) {
        db.push(data[0]); renderTable();
        ['f-serial','f-code','f-name','f-mfr','f-qty'].forEach(i => document.getElementById(i).value = '');
        showToast('Medicine added');
      }
    }
    
    function startEdit(id) {
      editingId = id; renderTable();
      const inp = document.getElementById('e-name');
      if (inp) inp.focus();
    }
    
    async function saveEdit(id) {
      if (!adminUnlocked) return;
      const idx = db.findIndex(m => m.id === id);
      if (idx === -1) return;
      
      const name = document.getElementById('e-name').value.trim();
      const code = document.getElementById('e-code').value.trim();
      if (!name || !code) { showToast('Name and Code required.', 'error'); return; }
    
      const updatedRecord = {
        serial: document.getElementById('e-serial').value.trim(),
        generic_code: code, name: name,
        manufacturers: document.getElementById('e-mfr').value.trim(),
        quantity: document.getElementById('e-qty').value.trim()
      };
    
      const { error } = await supabaseClient.from('medicines').update(updatedRecord).eq('id', id);
    
      if (error) {
        showToast('Permission Denied', 'error');
        console.error(error);
      } else {
        db[idx] = { ...db[idx], ...updatedRecord };
        editingId = null; renderTable();
        showToast('Medicine updated');
      }
    }
    
    function cancelEdit() { editingId = null; renderTable(); }
    
    async function deleteMedicine(id, name) {
      if (!adminUnlocked) return;
      if (!confirm('Delete \'' + name + '\'?')) return;
      
      const { error } = await supabaseClient.from('medicines').delete().eq('id', id);
    
      if (error) {
        showToast('Permission Denied', 'error');
        console.error(error);
      } else {
        db = db.filter(m => m.id !== id);
        renderTable(); showToast('Medicine deleted');
      }
    }
    
    // ── Auth (Server-side via Supabase) ──────────────────────
    async function checkSession() {
      // Supabase remembers the login session in the browser automatically
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        activateAdminUI();
      }
    }
    
    function activateAdminUI() {
      adminUnlocked = true;
      document.body.classList.add('admin-unlocked');
      document.getElementById('admin-status').textContent = 'Admin mode active';
      document.getElementById('admin-status').className   = 'admin-status unlocked';
      document.getElementById('lock-icon').textContent    = '';
      document.getElementById('lock-btn').style.display   = 'inline-flex';
      document.getElementById('admin-pw-input').style.display = 'none';
      document.querySelector('.admin-panel .btn-ghost').style.display = 'none';
      renderTable();
    }
    
    function deactivateAdminUI() {
      adminUnlocked = false; editingId = null;
      document.body.classList.remove('admin-unlocked');
      document.getElementById('admin-status').textContent     = 'Enter password to edit';
      document.getElementById('admin-status').className       = 'admin-status locked';
      document.getElementById('lock-icon').textContent        = '';
      document.getElementById('lock-btn').style.display       = 'none';
      document.getElementById('admin-pw-input').style.display = '';
      document.getElementById('admin-pw-input').value         = '';
      document.querySelector('.admin-panel .btn-ghost').style.display = '';
      renderTable();
    }
    
    async function attemptUnlock() {
      const pw = document.getElementById('admin-pw-input').value.trim();
      if (!pw) return;
    
      document.getElementById('admin-status').textContent = 'Authenticating...';
    
      // Ask Supabase to verify the password securely
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: ADMIN_EMAIL,
        password: pw
      });
    
      if (error) {
        document.getElementById('admin-status').textContent = '✗ Wrong password';
        document.getElementById('admin-status').className   = 'admin-status failed';
        setTimeout(() => {
          if(!adminUnlocked) {
            document.getElementById('admin-status').textContent = 'Enter password to edit';
            document.getElementById('admin-status').className   = 'admin-status locked';
          }
        }, 2500);
      } else {
        activateAdminUI();
        showToast('Admin mode unlocked');
      }
    }
    
    async function lockAdmin() {
      await supabaseClient.auth.signOut(); // Tell server we are logging out
      deactivateAdminUI();
      showToast('Admin mode locked');
    }
    
    document.getElementById('admin-pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptUnlock();
    });
    
    // ── Toast ─────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = 'toast' + (type === 'error' ? ' error' : '');
      t.textContent = msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }
    
    // ── PDF Parsing (Bulk Insert) ─────────────────────────────
    // (Keeping your exact PDF parsing logic, just updating the insert part to check Auth)
    function triggerPdfImport() { document.getElementById('pdf-input').click(); }
    
    async function parsePDF(file) {
      /* ... (Your exact parsePDF code remains the same internally) ... */
      const buf  = await file.arrayBuffer();
      const pdf  = await pdfjsLib.getDocument({ data: buf }).promise;
      const rows = [];
      const prog  = document.getElementById('pdf-progress');
      const bar   = document.getElementById('pdf-progress-bar');
      const label = document.getElementById('pdf-progress-label');
      prog.style.display = 'flex';
    
      for (let p = 1; p <= pdf.numPages; p++) {
        bar.value = Math.round((p / pdf.numPages) * 100);
        label.textContent = 'Page ' + p + ' of ' + pdf.numPages + '…';
        const page  = await pdf.getPage(p);
        const items = (await page.getTextContent()).items;
        const lines = {};
        for (const item of items) {
          const y = Math.round(item.transform[5]);
          if (!lines[y]) lines[y] = [];
          lines[y].push(item.str);
        }
        const sortedYs = Object.keys(lines).map(Number).sort((a,b) => b-a);
    
        let headerIdx = -1, colMap = {};
        for (let i = 0; i < sortedYs.length; i++) {
          const lineText = lines[sortedYs[i]].join(' ').toLowerCase();
          if (lineText.includes('generic') || lineText.includes('medicine') || lineText.includes('drug')) {
            headerIdx = i;
            lines[sortedYs[i]].forEach((c, ci) => {
              const lc = c.toLowerCase();
              if (!colMap.serial && (lc.includes('row') || lc.includes('serial') || lc === '#' || lc === 'no')) colMap.serial = ci;
              if (!colMap.code   && (lc.includes('code') || lc.includes('generic'))) colMap.code = ci;
              if (!colMap.name   && (lc.includes('name') || lc.includes('medicine') || lc.includes('drug'))) colMap.name = ci;
              if (!colMap.mfr    && (lc.includes('brand') || lc.includes('manuf') || lc.includes('maker') || lc.includes('supplier'))) colMap.mfr = ci;
              if (!colMap.qty    && (lc.includes('qty') || lc.includes('quantity') || lc.includes('need') || lc.includes('amount') || lc.includes('month'))) colMap.qty = ci;
            });
            break;
          }
        }
    
        if (headerIdx === -1) {
          for (let i = 0; i < sortedYs.length; i++) {
            const cells = lines[sortedYs[i]];
            if (cells.length >= 4) rows.push({ serial: cells[0]||'', generic_code: cells[1]||'', name: cells[2]||'', manufacturers: cells[3]||'', quantity: cells[4]||'' });
          }
        } else {
          for (let i = headerIdx + 1; i < sortedYs.length; i++) {
            const cells = lines[sortedYs[i]];
            if (!cells.some(c => c.trim())) continue;
            const get = (key, fb) => { const ci = colMap[key]; return (ci !== undefined && cells[ci]) ? cells[ci].trim() : (fb||''); };
            rows.push({ serial: get('serial', String(rows.length+1)), generic_code: get('code'), name: get('name'), manufacturers: get('mfr'), quantity: get('qty') });
          }
        }
      }
      prog.style.display = 'none'; bar.value = 0;
      return rows.filter(r => r.name && r.name.length > 1);
    }
    
    document.getElementById('pdf-input').addEventListener('change', async function() {
      if (!adminUnlocked) { showToast('Must be logged in to import', 'error'); return; }
      const file = this.files[0];
      if (!file) return;
      document.getElementById('upload-status').textContent = 'Parsing ' + file.name + '…';
      const btn = document.getElementById('btn-import');
      btn.disabled = true;
    
      try {
        const rows = await parsePDF(file);
        if (!rows.length) { 
          showToast('No data found in PDF.', 'error'); 
          document.getElementById('upload-status').textContent = ''; 
          btn.disabled = false; return; 
        }
    
        document.getElementById('upload-status').textContent = 'Uploading to Database…';
        const { data, error } = await supabaseClient.from('medicines').insert(rows).select();
    
        if (error) throw error;
    
        if (data) { db = db.concat(data); renderTable(); }
        document.getElementById('upload-status').textContent = '';
        showToast(`${data.length} records imported successfully!`);
      } catch(e) {
        showToast('Import error or permission denied.', 'error');
        document.getElementById('upload-status').textContent = '';
        console.error(e);
      }
      btn.disabled = false; this.value = '';
    });
    
    // ── Drag & drop & Enter Key ───────────────────────────────
    const dz = document.getElementById('drop-zone');
    ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag-over'); }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag-over'); }));
    dz.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.pdf')) {
        const dt = new DataTransfer(); dt.items.add(file);
        document.getElementById('pdf-input').files = dt.files;
        document.getElementById('pdf-input').dispatchEvent(new Event('change'));
      }
    });
    document.getElementById('f-qty').addEventListener('keydown', e => { if (e.key === 'Enter') addMedicine(); });
    
    // ── Init ──────────────────────────────────────────────────
    checkSession(); // Checks if you are already logged in from a previous visit
    loadDB();
    </script>
